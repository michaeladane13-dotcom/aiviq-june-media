name: Instagram Reel Poster
on:
  schedule:
    - cron: '0,30 15,16,17,18,19,20,21,22,23,0,1,2 * * *'  # every 30 min, PT daytime (UTC offset)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Post due reels
        env:
          META_CREDS: ${{ secrets.META_CREDS }}
        run: python3 ig_post.py
      - name: Commit progress
        run: |
          git config user.name "ig-bot"
          git config user.email "bot@aiviq"
          git add ig_done.json
          git diff --staged --quiet || git commit -m "ig progress $(date -u +%FT%TZ)"
          git push || true
